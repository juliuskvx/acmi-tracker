name: Refresh ACMI Data
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests openpyxl
      - name: Run fetch script
        env:
          FR24_API_KEY: ${{ secrets.FR24_API_KEY }}
        run: python scripts/fetch_acmi.py
      - name: Export to Excel
        run: python scripts/export_excel.py
      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/acmi_data.json data/acmi_history.json data/acmi_log.xlsx
          git diff --cached --quiet || git commit -m "chore: daily ACMI refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull origin main --rebase
          git push origin main
